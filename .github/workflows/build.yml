name: Build Flutter Artifacts

on:
  push:
    tags:
      - 'v*'         # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────
  # 1. Windows EXE
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'   # pin your version
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Unhide AppData for cargokit
        run: attrib -h C:\Users\runneradmin\AppData

      - name: Build Windows release
        run: flutter build windows --release

      - name: Compress Windows release
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/sheep-windows.zip

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/sheep-windows.zip


  # ─────────────────────────────────────────────
  # 2. Android APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk


  # ─────────────────────────────────────────────
  # 3. Linux DEB
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            dpkg-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package as .deb
        run: |
          APP_NAME="sheep"
          APP_VERSION="${GITHUB_REF_NAME#v}-${GITHUB_RUN_NUMBER}"
          DEB_DIR="deb_build/${APP_NAME}_${APP_VERSION}"

          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/lib/${APP_NAME}
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/doc/${APP_NAME}

          # Copy Flutter bundle
          cp -r build/linux/x64/release/bundle/* \
            ${DEB_DIR}/usr/lib/${APP_NAME}/

          # Copy license/copyright file for Debian package compliance
          cp LICENSE ${DEB_DIR}/usr/share/doc/${APP_NAME}/copyright

          # Wrapper script so it's launchable from terminal
          cat > ${DEB_DIR}/usr/bin/${APP_NAME} << EOF
          #!/bin/bash
          exec /usr/lib/${APP_NAME}/${APP_NAME} "\$@"
          EOF
          chmod +x ${DEB_DIR}/usr/bin/${APP_NAME}

          # Desktop entry so it appears in app menu
          cat > ${DEB_DIR}/usr/share/applications/${APP_NAME}.desktop << EOF
          [Desktop Entry]
          Name=Sheep
          Exec=/usr/lib/${APP_NAME}/${APP_NAME}
          Icon=/usr/lib/${APP_NAME}/data/flutter_assets/assets/icons/sheep_icon.png
          Type=Application
          Categories=Utility;
          EOF

          # Control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Architecture: amd64
          Maintainer: Hardik Bansal <hardikbansal31@gmail.com>
          Description: A cross-platform note-taking app
          EOF

          dpkg-deb --build ${DEB_DIR}

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: deb_build/*.deb
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write


    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/sheep-windows.zip
            android-apk/app-release.apk
            linux-deb/*.deb