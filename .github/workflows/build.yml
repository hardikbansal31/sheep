name: Build Flutter Artifacts

on:
  push:
    tags:
      - 'v*'         # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────
  # 1. Windows EXE
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'   # pin your version
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/


  # ─────────────────────────────────────────────
  # 2. Android APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk


  # ─────────────────────────────────────────────
  # 3. Linux DEB
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            dpkg-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package as .deb
        run: |
          APP_NAME="sheep"        
          APP_VERSION="1.0.0"             # or read from pubspec.yaml
          DEB_DIR="deb_build/${APP_NAME}_${APP_VERSION}"

          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/local/bin/${APP_NAME}

          # Copy Flutter build output
          cp -r build/linux/x64/release/bundle/* \
            ${DEB_DIR}/usr/local/bin/${APP_NAME}/

          # Write control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Architecture: amd64
          Maintainer: Hardik B bansalhardik31@gmail.com
          Description: cross platform note taking app.
          EOF

          dpkg-deb --build ${DEB_DIR}

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: deb_build/*.deb
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/**
            android-apk/app-release.apk
            linux-deb/*.deb