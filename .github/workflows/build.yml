name: Build Flutter Artifacts

on:
  push:
    tags:
      - 'v*'         # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────
  # 1. Windows EXE
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'   # pin your version
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Unhide AppData for cargokit
        run: attrib -h C:\Users\runneradmin\AppData

      - name: Build Windows release
        shell: bash
        run: flutter build windows --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/installer/*.exe


  # ─────────────────────────────────────────────
  # 2. Android APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        env:
          KEYSTORE_BASE64: "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          KEYSTORE_PASSWORD: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_ALIAS: "${{ secrets.ANDROID_KEY_ALIAS }}"
          KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            export KEYSTORE_PATH=$(pwd)/android/app/release.keystore
          fi
          flutter build apk --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk


  # ─────────────────────────────────────────────
  # 3. Linux DEB
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            dpkg-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Package as .deb
        run: |
          APP_NAME="sheep"
          APP_VERSION="${GITHUB_REF_NAME#v}-${GITHUB_RUN_NUMBER}"
          DEB_DIR="deb_build/${APP_NAME}_${APP_VERSION}"

          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/lib/${APP_NAME}
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/doc/${APP_NAME}

          # Copy Flutter bundle
          cp -r build/linux/x64/release/bundle/* \
            ${DEB_DIR}/usr/lib/${APP_NAME}/

          # Copy license/copyright file for Debian package compliance
          cp LICENSE ${DEB_DIR}/usr/share/doc/${APP_NAME}/copyright

          # Wrapper script so it's launchable from terminal
          cat > ${DEB_DIR}/usr/bin/${APP_NAME} << EOF
          #!/bin/bash
          exec /usr/lib/${APP_NAME}/${APP_NAME} "\$@"
          EOF
          chmod +x ${DEB_DIR}/usr/bin/${APP_NAME}

          # Desktop entry so it appears in app menu
          cat > ${DEB_DIR}/usr/share/applications/${APP_NAME}.desktop << EOF
          [Desktop Entry]
          Name=Sheep
          Exec=/usr/lib/${APP_NAME}/${APP_NAME}
          Icon=/usr/lib/${APP_NAME}/data/flutter_assets/assets/icons/sheep_icon.png
          Type=Application
          Categories=Utility;
          EOF

          # Control file
          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Architecture: amd64
          Maintainer: Hardik Bansal <hardikbansal31@gmail.com>
          Description: A cross-platform note-taking app
          EOF

          dpkg-deb --build ${DEB_DIR}

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: deb_build/*.deb

  # ─────────────────────────────────────────────
  # 4. macOS DMG
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos -v --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p build/macos/dmg
          create-dmg \
            --volname "Sheep" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "sheep.app" 175 190 \
            --hide-extension "sheep.app" \
            --app-drop-link 425 190 \
            "build/macos/dmg/sheep-macos.dmg" \
            "build/macos/Build/Products/Release/sheep.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/dmg/sheep-macos.dmg
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write


    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/*.exe
            android-apk/app-release.apk
            linux-deb/*.deb
            macos-dmg/sheep-macos.dmg